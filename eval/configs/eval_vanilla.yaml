# Echo-ViLD eval config — Vanilla PEAV + ViLD text
model_id: vanilla
ckpt_path: weights/vanilla/best.pth
text_emb_variant: vild_text_embeddings_80

# Model architecture (must match training config)
roi_dim: 256
hidden_dim: 512
embed_dim: 1024
temperature: 0.01

# Data source — set precomputed: true for 100-image subset test
precomputed: true

# For full eval, set precomputed: false and provide these:
# ann_json: /path/to/lvis_v1_val.json
# image_dir: /path/to/coco/val2017

# Detection parameters
score_threshold: 0.01
nms_iou: 0.5
output_dir: eval_results
