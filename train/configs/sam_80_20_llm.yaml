model_id: sam_80_20_llm
image_emb_variant: sam_withcontext_80_20
text_emb_variant: llm_text_embeddings_80
ckpt_dir: weights/sam_80_20_llm
log_csv:  weights/sam_80_20_llm/loss.csv

roi_dim: 256
hidden_dim: 512
embed_dim: 1024
num_classes: 80
temperature: 0.01
lambda_distill: 45

optimizer: adamw
lr: 1.0e-4
weight_decay: 1.0e-4
batch_size: 4
epochs: 20
warmup_steps: 500
scheduler: cosine
amp: fp16
seed: 42
